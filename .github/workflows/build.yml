name: Build and Package LinkPet DMG

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode
        run: ls /Applications/ | grep Xcode || true

      - name: Build .app
        run: |
          mkdir -p build
          SDK=$(xcrun --sdk macosx --show-sdk-path)
          swiftc \
            LinkPet/AppDelegate.swift \
            LinkPet/PetViewModel.swift \
            LinkPet/PetView.swift \
            LinkPet/PetWindow.swift \
            -o build/LinkPet_bin \
            -sdk "$SDK" \
            -target arm64-apple-macos13 \
            -framework AppKit \
            -framework SwiftUI \
            -framework Combine

      - name: Bundle into .app
        run: |
          APP=build/LinkPet.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp build/LinkPet_bin "$APP/Contents/MacOS/LinkPet"
          cp LinkPet/Info.plist "$APP/Contents/Info.plist"
          chmod +x "$APP/Contents/MacOS/LinkPet"
          echo "App bundle created:"
          ls -la "$APP/Contents/MacOS/"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "LinkPet" \
            -srcfolder build/LinkPet.app \
            -ov \
            -format UDZO \
            LinkPet.dmg
          echo "DMG created:"
          ls -lh LinkPet.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: LinkPet-dmg
          path: LinkPet.dmg
          retention-days: 7
