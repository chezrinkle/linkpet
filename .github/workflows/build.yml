name: Build and Package LinkPet DMG

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -project LinkPet.xcodeproj \
            -scheme LinkPet \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build
          echo "Build complete"
          find build -name "LinkPet.app" -type d | head -5

      - name: Locate app and create DMG
        run: |
          APP_PATH=$(find build -name "LinkPet.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          # Remove quarantine
          xattr -cr "$APP_PATH" || true
          
          # Create DMG
          hdiutil create \
            -volname "LinkPet" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            LinkPet.dmg
          
          ls -lh LinkPet.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: LinkPet-dmg
          path: LinkPet.dmg
          retention-days: 14
